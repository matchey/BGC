<!DOCTYPE HTML>
<html>
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <meta name="color-scheme" content="dark">
      <meta name="theme-color" content="#0b0d10">
      <title>BGC</title>

      <!-- Fonts: Inter (Latin) + Noto Sans JP (Japanese) -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap">

      <!-- Icon set -->
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

      <!-- App stylesheet (modern minimal × dark, layered on top of Bootstrap) -->
      <link rel="stylesheet" href="assets/app.css">

      <script src="main.js"></script>
      <script src="DragDropTouch.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.13/dist/html-to-image.min.js"></script>
  </head>
  <body>
      <!-- <script>var app = Elm.Main.init();</script> -->
      <script>
        const app = Elm.Main.init({
          node: document.querySelector('main'),
          flags: {
            data: JSON.parse(localStorage.getItem('localStorageTokenKey')),
            lang: navigator.language || 'en',
          },
        });

        // app.ports.loadData.subscribe(() => {
        //   app.ports.loadData.send(JSON.parse(localStorage.getItem('localStorageTokenKey')));
        // });
        //
        // app.ports.saveData.subscribe((data) => {
        //   localStorage.setItem('localStorageTokenKey', JSON.stringify(data));
        // });

        app.ports.portSetToken.subscribe( (tn) => {
          if( tn && tn[0] && tn[1] ) {
            localStorage.setItem("token",tn[0]);
            localStorage.setItem("user_id",tn[1]);
          } else { // tn[0]=="" or tn[1]==""
            localStorage.removeItem("token");
            localStorage.removeItem("user_id");
          }
        } )

        app.ports.portGetToken.subscribe( (key) => {
          // key : not used
          const token = localStorage.getItem("token");
          const user_id = localStorage.getItem("user_id");
          if( token && user_id ) {
            app.ports.portResToken.send([token,user_id]);
          } else {
            app.ports.portResToken.send(["",""]);
          }
        })

        app.ports.copyToClipboard.subscribe( (id) => {
          let copyText = document.getElementById(id[0]);
          let copyButton = document.getElementById(id[1]);

          copyText.select();/* Select the text field */
          copyText.setSelectionRange(0, 99999); /*For mobile devices*/

          /* Copy the text inside the text field */
          document.execCommand("copy");
          copyButton.textContent = "Copied!";
        })

        // --- Payment Calculator localStorage ---

        app.ports.portSavePaymentCalc.subscribe((data) => {
          const eventId = data.cachedEventId || 'default';
          localStorage.setItem('paymentCalc_' + eventId, JSON.stringify(data));
        });

        app.ports.portLoadPaymentCalc.subscribe((eventId) => {
          const key = 'paymentCalc_' + (eventId || 'default');
          const stored = localStorage.getItem(key);
          if (stored) {
            try {
              app.ports.portLoadPaymentCalcResult.send(JSON.parse(stored));
            } catch (e) {
              // Ignore malformed data
            }
          }
        });

        // --- Payment Summary: copy as image to clipboard ---

        // Capture the node as-is, then composite it onto a canvas with
        // page background + subtle accent gradient + outer padding.
        // Done in canvas (not via DOM wrapper) so the live panel never moves
        // and its layout is never disturbed during capture.
        async function renderSummaryFramed(node) {
          const PAD = 20;
          const RADIUS = 16;
          const pageBg =
            getComputedStyle(document.documentElement).backgroundColor ||
            getComputedStyle(document.body).backgroundColor ||
            '#0b0d10';

          const dataUrl = await htmlToImage.toPng(node, {
            pixelRatio: 2,
            cacheBust: true,
          });
          const img = await new Promise((resolve, reject) => {
            const i = new Image();
            i.onload = () => resolve(i);
            i.onerror = reject;
            i.src = dataUrl;
          });

          const dpr = 2; // matches pixelRatio above
          const innerW = img.naturalWidth;
          const innerH = img.naturalHeight;
          const padPx = PAD * dpr;
          const radiusPx = RADIUS * dpr;
          const canvas = document.createElement('canvas');
          canvas.width = innerW + padPx * 2;
          canvas.height = innerH + padPx * 2;
          const ctx = canvas.getContext('2d');

          // Rounded background frame.
          const w = canvas.width;
          const h = canvas.height;
          ctx.beginPath();
          if (ctx.roundRect) {
            ctx.roundRect(0, 0, w, h, radiusPx);
          } else {
            const r = radiusPx;
            ctx.moveTo(r, 0);
            ctx.lineTo(w - r, 0);
            ctx.quadraticCurveTo(w, 0, w, r);
            ctx.lineTo(w, h - r);
            ctx.quadraticCurveTo(w, h, w - r, h);
            ctx.lineTo(r, h);
            ctx.quadraticCurveTo(0, h, 0, h - r);
            ctx.lineTo(0, r);
            ctx.quadraticCurveTo(0, 0, r, 0);
            ctx.closePath();
          }
          ctx.fillStyle = pageBg;
          ctx.fill();

          // Glass-feel accent gradients (top-left cyan, bottom-right violet).
          const g1 = ctx.createRadialGradient(0, 0, 0, 0, 0, Math.max(w, h) * 0.9);
          g1.addColorStop(0, 'rgba(34, 211, 238, 0.10)');
          g1.addColorStop(1, 'rgba(34, 211, 238, 0)');
          ctx.fillStyle = g1;
          ctx.fill();
          const g2 = ctx.createRadialGradient(w, h, 0, w, h, Math.max(w, h) * 0.9);
          g2.addColorStop(0, 'rgba(167, 139, 250, 0.08)');
          g2.addColorStop(1, 'rgba(167, 139, 250, 0)');
          ctx.fillStyle = g2;
          ctx.fill();

          ctx.drawImage(img, padPx, padPx, innerW, innerH);

          return await new Promise((resolve, reject) =>
            canvas.toBlob((b) => (b ? resolve(b) : reject(new Error('toBlob-null'))), 'image/png')
          );
        }

        app.ports.copySummaryImage.subscribe(async (nodeId) => {
          const reply = (s) => app.ports.copySummaryImageResult.send(s);
          const node = document.getElementById(nodeId);
          if (!node || typeof htmlToImage === 'undefined') {
            reply('error');
            return;
          }

          try {
            if (navigator.clipboard && window.ClipboardItem && window.isSecureContext) {
              // Safari requires ClipboardItem to be constructed synchronously
              // inside the user gesture; passing a Promise<Blob> is allowed.
              const item = new ClipboardItem({
                'image/png': renderSummaryFramed(node),
              });
              await navigator.clipboard.write([item]);
              reply('copied');
              return;
            }
            throw new Error('clipboard-unavailable');
          } catch (e) {
            try {
              const blob = await renderSummaryFramed(node);
              const url = URL.createObjectURL(blob);
              const a = Object.assign(document.createElement('a'), {
                href: url,
                download: 'payment-summary.png',
              });
              document.body.appendChild(a);
              a.click();
              a.remove();
              URL.revokeObjectURL(url);
              reply('downloaded');
            } catch (e2) {
              console.error('copySummaryImage failed:', e2);
              reply('error');
            }
          }
        });

        // --- WebAuthn / Passkey ---

        function b64uToBytes(b64u) {
          const b64 = b64u.replace(/-/g, '+').replace(/_/g, '/');
          const pad = b64.length % 4 === 0 ? '' : '='.repeat(4 - (b64.length % 4));
          const bin = atob(b64 + pad);
          return Uint8Array.from(bin, c => c.charCodeAt(0));
        }

        function bytesToB64u(buf) {
          const bytes = new Uint8Array(buf);
          let bin = '';
          bytes.forEach(b => bin += String.fromCharCode(b));
          return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        // Registration: call navigator.credentials.create()
        app.ports.portWebAuthnCreate.subscribe(async (options) => {
          try {
            const excludeCredentials = (options.excludeCredentials || []).map(c => ({
              type: c.type,
              id: b64uToBytes(c.id),
            }));
            const publicKey = {
              challenge: b64uToBytes(options.challenge),
              rp: options.rp,
              user: {
                id: b64uToBytes(options.user.id),
                name: options.user.name,
                displayName: options.user.displayName,
              },
              pubKeyCredParams: options.pubKeyCredParams,
              excludeCredentials: excludeCredentials,
              authenticatorSelection: options.authenticatorSelection || {},
              timeout: options.timeout,
              attestation: options.attestation || 'none',
            };
            const cred = await navigator.credentials.create({ publicKey });
            const result = {
              id: bytesToB64u(cred.rawId),
              response: {
                clientDataJSON: bytesToB64u(cred.response.clientDataJSON),
                attestationObject: bytesToB64u(cred.response.attestationObject),
              },
            };
            app.ports.portWebAuthnCreateResult.send(result);
          } catch (e) {
            if (e.name === 'InvalidStateError') {
              app.ports.portWebAuthnError.send('This device already has a passkey registered.');
            } else {
              app.ports.portWebAuthnError.send('Passkey registration failed: ' + e.message);
            }
          }
        });

        // Authentication: call navigator.credentials.get()
        app.ports.portWebAuthnGet.subscribe(async (options) => {
          try {
            const allowCredentials = (options.allowCredentials || []).map(c => ({
              type: c.type,
              id: b64uToBytes(c.id),
            }));
            const publicKey = {
              challenge: b64uToBytes(options.challenge),
              rpId: options.rpId,
              allowCredentials: allowCredentials,
              userVerification: options.userVerification || 'preferred',
              timeout: options.timeout,
            };
            const assertion = await navigator.credentials.get({ publicKey });
            const result = {
              id: bytesToB64u(assertion.rawId),
              response: {
                clientDataJSON: bytesToB64u(assertion.response.clientDataJSON),
                authenticatorData: bytesToB64u(assertion.response.authenticatorData),
                signature: bytesToB64u(assertion.response.signature),
                userHandle: assertion.response.userHandle
                  ? bytesToB64u(assertion.response.userHandle) : null,
              },
              sessionKey: options.sessionKey || null,
            };
            app.ports.portWebAuthnGetResult.send(result);
          } catch (e) {
            app.ports.portWebAuthnError.send('Passkey login failed: ' + e.message);
          }
        });
      </script>
  </body>
</html>
